name: Cross-version Benchmarks

# Runs benchmarks on every supported Go version, generates per-version
# Markdown results, and opens a PR to commit them.

on:
  schedule:
    - cron: '0 6 * * 0'  # Sunday 6:00 UTC — weekly
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bench:
    name: Benchmark (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.22.x', '1.23.x', '1.24.x', '1.25.x', '1.26.x']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download dependencies
        run: go mod download && cd benchmarks && go mod download

      - name: Run benchmarks and format results
        run: |
          GOVERSION=$(go env GOVERSION | sed 's/^go//' | cut -d. -f1-2)
          cd benchmarks && go test ./... -bench=. -benchmem -count=5 -run=^$ \
            | go run ../scripts/benchfmt/main.go \
                -output "../benchmarks/results/go${GOVERSION}.md" \
                -go-version "${GOVERSION}"

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.go-version }}
          path: benchmarks/results/
          if-no-files-found: error

  publish:
    name: Open PR with results
    runs-on: ubuntu-latest
    needs: bench
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all version results
        uses: actions/download-artifact@v4
        with:
          pattern: bench-*
          path: benchmarks/results/
          merge-multiple: true

      - name: Commit and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="automated/bench-results-$(date +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add benchmarks/results/
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "bench: update cross-version results $(date +%Y-%m-%d)"
          git push origin "$BRANCH"
          gh pr create \
            --title "bench: cross-version benchmark results $(date +%Y-%m-%d)" \
            --body "$(printf 'Automated benchmark results across Go 1.22–1.26.\n\nGenerated by the [Cross-version Benchmarks](%s/%s/actions/workflows/bench-matrix.yml) workflow.' "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY")" \
            --head "$BRANCH" \
            --base main \
            || echo "PR already open for this branch."
