name: CI

# CI strategy (per ADR-01):
# - Go version matrix: 1.22 (floor, hmap), 1.24 (Swiss Tables), stable
# - Go tip runs as non-blocking to catch future breaking changes early
# - Tests run with race detector and all build-tag combinations
# - Build tags tested: default (safe), unsafe_accel, reflectx_strict
# - Coverage: stable uploads default+reflectx_strict profiles; 1.22 uploads legacy hmap profile

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Required for Codecov OIDC

env:
  CGO_ENABLED: "1"  # required for -race on standard Go toolchain

jobs:
  build:
    name: Build (${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.22.x', '1.24.x', 'stable']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - run: go mod download
      - run: go mod verify
      - run: go build ./...
      - run: go build -tags unsafe_accel ./...
      - run: go build -tags reflectx_strict ./...

  build-tip:
    name: Build (go tip) [non-blocking]
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Cache gotip SDK
        id: cache-gotip
        uses: actions/cache@v4
        with:
          path: ~/sdk/gotip
          key: gotip-${{ runner.os }}-${{ github.sha }}
          restore-keys: gotip-${{ runner.os }}-

      - name: Install gotip launcher
        run: go install golang.org/dl/gotip@latest

      - name: Download gotip (compile from source on cache miss)
        if: steps.cache-gotip.outputs.cache-hit != 'true'
        run: gotip download

      - name: Build with gotip
        run: |
          gotip build ./...
          gotip build -tags unsafe_accel ./...

  test:
    name: Test (${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.22.x', '1.24.x', 'stable']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - run: go mod download

      - name: go vet
        run: go vet ./...

      - name: go vet (unsafe_accel)
        run: go vet -tags unsafe_accel ./...

      - name: Tests with race detector
        run: go test -race -count=1 ./...

      - name: Tests with race detector (unsafe_accel)
        run: go test -race -count=1 -tags unsafe_accel ./...

      - name: Tests strict mode (no unsafe layer in binary)
        run: go test -race -count=1 -tags reflectx_strict ./...

      # Coverage: stable uploads default + reflectx_strict profiles.
      # Go 1.22 uploads the legacy hmap profile — layer3_map_legacy.go is only
      # compiled on Go < 1.24, so we need that job for full patch coverage.
      - name: Coverage - default tags (stable)
        if: matrix.go-version == 'stable'
        run: |
          go list ./... | grep -v '/examples/' | \
            xargs go test -race -count=1 -coverprofile=coverage-default.txt -covermode=atomic

      - name: Coverage - reflectx_strict (stable)
        if: matrix.go-version == 'stable'
        run: |
          go list ./... | grep -v '/examples/' | \
            xargs go test -race -count=1 -tags reflectx_strict -coverprofile=coverage-strict.txt -covermode=atomic

      - name: Coverage - legacy hmap backend (1.22)
        if: matrix.go-version == '1.22.x'
        run: |
          go list ./... | grep -v '/examples/' | \
            xargs go test -race -count=1 -coverprofile=coverage-legacy.txt -covermode=atomic

      - name: Upload coverage to Codecov (stable)
        if: matrix.go-version == 'stable'
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: ./coverage-default.txt,./coverage-strict.txt
          name: codecov-saferefl-stable
          fail_ci_if_error: true

      - name: Upload coverage to Codecov (1.22, legacy hmap backend)
        if: matrix.go-version == '1.22.x'
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: ./coverage-legacy.txt
          name: codecov-saferefl-go122
          fail_ci_if_error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --timeout=5m

  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - run: go mod download

      - name: Fuzz Get (60s)
        run: go test . -fuzz=FuzzGet -fuzztime=60s

      - name: Fuzz UnsafeFieldPtr (60s)
        run: go test ./internal/unsafelayout/ -fuzz=FuzzUnsafeFieldPtr -fuzztime=60s

  consistency:
    name: Consistency (L2 vs L3)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - run: go mod download

      - name: Consistency tests with race detector
        run: go test ./... -run TestConsistency -race -v

  # Validates the portable kindOffset constant on 32-bit architectures.
  # linux/386 runs natively on the amd64 host (no QEMU needed).
  # linux/arm uses qemu-user-static via binfmt_misc.
  # Race detector is omitted because CGO is disabled for cross-arch builds.
  test-32bit:
    name: Test (32-bit ${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: ['386', 'arm']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: Install QEMU (arm only)
        if: matrix.goarch == 'arm'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y qemu-user-static

      - name: Register binfmt_misc handlers (arm only)
        if: matrix.goarch == 'arm'
        run: |
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - run: go mod download

      - name: Build (${{ matrix.goarch }})
        env:
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          GOARM: "7"
        run: go build ./...

      - name: Test (${{ matrix.goarch }})
        env:
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          GOARM: "7"
          SAFEREFL_STRICT: "1"
        run: go test -count=1 ./...

  # Native arm64 run — validates on Apple Silicon layout.
  test-arm64:
    name: Test (macOS arm64)
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - run: go mod download

      - name: Tests with race detector (arm64)
        env:
          SAFEREFL_STRICT: "1"
        run: go test -race -count=1 ./...

  formatting:
    name: Formatting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Unformatted files:"
            gofmt -l .
            echo "Run 'go fmt ./...' to fix."
            exit 1
          fi
